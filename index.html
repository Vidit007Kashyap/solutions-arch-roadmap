function buildNav() {
  const nav = document.getElementById('phase-nav');
  const bar = document.getElementById('progress-bar');
  phases.forEach((ph, i) => {
    const pill = document.createElement('button');
    pill.className = 'nav-pill';
    pill.textContent = `${ph.id}. ${ph.title.split(' ').slice(0,2).join(' ')}`;
    pill.style.color = ph.color.dark;
    pill.style.borderColor = ph.color.mid;
    pill.style.background = ph.color.light;
    pill.onclick = () => {
      document.getElementById(`phase-${ph.id}`).scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    nav.appendChild(pill);

    const seg = document.createElement('div');
    seg.className = 'progress-seg';
    seg.id = `seg-${ph.id}`;
    seg.style.background = ph.color.mid;
    seg.style.opacity = '0.25';
    bar.appendChild(seg);
  });
}

function buildPhases() {
  const container = document.getElementById('phases-container');
  phases.forEach(ph => {
    const card = document.createElement('div');
    card.className = 'phase-card';
    card.id = `phase-${ph.id}`;

    const dot = document.createElement('div');
    dot.className = 'phase-dot';
    dot.style.background = ph.color.dot;
    dot.onclick = () => toggleCard(card, ph.id);
    card.appendChild(dot);

    const header = document.createElement('div');
    header.className = 'phase-header';
    header.innerHTML = `
      <span class="phase-num" style="background:${ph.color.light};color:${ph.color.dark};border:0.5px solid ${ph.color.mid}">Phase ${ph.id}</span>
      <div class="phase-title-block">
        <div class="phase-title">${ph.title}</div>
        <div class="phase-subtitle">${ph.subtitle}</div>
      </div>
      <span class="phase-duration">${ph.duration}</span>
      <span class="phase-chevron">▶</span>
    `;
    header.onclick = () => toggleCard(card, ph.id);
    card.appendChild(header);

    const body = document.createElement('div');
    body.className = 'phase-body';

    const tabs = ['Concepts', 'Why it matters', 'Projects', 'Mental models', 'Mistakes', 'Resources', 'Schedule'];
    const tabsDiv = document.createElement('div');
    tabsDiv.className = 'section-tabs';

    const contentDiv = document.createElement('div');
    contentDiv.className = 'tab-content';

    tabs.forEach((tab, ti) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (ti === 0 ? ' active' : '');
      btn.textContent = tab;
      btn.style.borderBottomColor = ti === 0 ? ph.color.mid : 'transparent';
      btn.onclick = () => {
        tabsDiv.querySelectorAll('.tab-btn').forEach((b, bi) => {
          b.classList.toggle('active', bi === ti);
          b.style.borderBottomColor = bi === ti ? ph.color.mid : 'transparent';
        });
        contentDiv.querySelectorAll('.tab-panel').forEach((p, pi) => {
          p.classList.toggle('active', pi === ti);
        });
      };
      tabsDiv.appendChild(btn);
    });

    // Concepts panel
    const conceptsPanel = document.createElement('div');
    conceptsPanel.className = 'tab-panel active';
    let cHtml = '<div class="concept-grid">';
    ph.concepts.forEach(c => {
      cHtml += `<div class="concept-chip">${c.name}<span>${c.note}</span></div>`;
    });
    cHtml += '</div>';
    conceptsPanel.innerHTML = cHtml;

    // Why panel
    const whyPanel = document.createElement('div');
    whyPanel.className = 'tab-panel';
    whyPanel.innerHTML = `<div class="why-matters">${ph.why}</div>`;

    // Projects panel
    const projPanel = document.createElement('div');
    projPanel.className = 'tab-panel';
    ph.projects.forEach(p => {
      const lc = levelColors[p.level] || levelColors.STARTER;
      projPanel.innerHTML += `
        <div class="project-item">
          <span class="project-level" style="background:${lc.bg};color:${lc.color}">${p.level}</span>
          <div class="project-name">${p.name}</div>
          <div class="project-desc">${p.desc}</div>
        </div>`;
    });

    // Mental models panel
    const mmPanel = document.createElement('div');
    mmPanel.className = 'tab-panel';
    ph.mentalModels.forEach(mm => {
      mmPanel.innerHTML += `<div class="mental-model">${mm}</div>`;
    });

    // Mistakes panel
    const mistakesPanel = document.createElement('div');
    mistakesPanel.className = 'tab-panel';
    ph.mistakes.forEach(m => {
      mistakesPanel.innerHTML += `
        <div class="mistake-item">
          <div class="mistake-icon">!</div>
          <div class="mistake-text"><strong>${m.title}:</strong> ${m.desc}</div>
        </div>`;
    });

    // Resources panel
    const resPanel = document.createElement('div');
    resPanel.className = 'tab-panel';
    ph.resources.forEach(r => {
      resPanel.innerHTML += `
        <div class="resource-item">
          <span class="resource-type">${r.type}</span>
          <div><div class="resource-name">${r.name}</div><div class="resource-sub">${r.sub}</div></div>
        </div>`;
    });

    // Schedule panel
    const schedPanel = document.createElement('div');
    schedPanel.className = 'tab-panel';
    ph.schedule.forEach(s => {
      schedPanel.innerHTML += `
        <div class="timeline-row">
          <span class="week-badge">${s.period}</span>
          <div class="week-task">${s.task}</div>
        </div>`;
    });

    [conceptsPanel, whyPanel, projPanel, mmPanel, mistakesPanel, resPanel, schedPanel].forEach(p => contentDiv.appendChild(p));

    body.appendChild(tabsDiv);
    body.appendChild(contentDiv);
    card.appendChild(body);
    container.appendChild(card);
  });
}

function toggleCard(card, phId) {
  const wasExpanded = card.classList.contains('expanded');
  card.classList.toggle('expanded', !wasExpanded);
  document.getElementById(`seg-${phId}`).style.opacity = wasExpanded ? '0.25' : '1';
}

buildNav();
buildPhases();

// Auto-expand phase 1
const firstCard = document.getElementById('phase-1');
if (firstCard) { firstCard.classList.add('expanded'); document.getElementById('seg-1').style.opacity = '1'; }
