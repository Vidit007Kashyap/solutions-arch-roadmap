<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidit</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}

.top-bar{padding:.75rem 1rem;border-bottom:.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.app-title{font-size:15px;font-weight:500;color:var(--color-text-primary);flex:1}
.phase-pills{display:flex;gap:5px;flex-wrap:wrap}
.pp{padding:4px 11px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;border:.5px solid;transition:all .15s;white-space:nowrap}

.layout{display:flex;min-height:600px}
.sidebar{width:220px;flex-shrink:0;border-right:.5px solid var(--color-border-tertiary);overflow-y:auto;max-height:800px}
.main{flex:1;overflow-y:auto;max-height:800px;padding:1rem}

.sb-phase{border-bottom:.5px solid var(--color-border-tertiary)}
.sb-phase-hdr{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;user-select:none}
.sb-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sb-phase-name{font-size:12px;font-weight:500;color:var(--color-text-primary);flex:1;line-height:1.3}
.sb-chev{font-size:10px;color:var(--color-text-tertiary);transition:transform .2s}
.sb-phase.open .sb-chev{transform:rotate(90deg)}
.sb-subjects{display:none;padding:0 0 6px 0}
.sb-phase.open .sb-subjects{display:block}
.sb-subj{padding:6px 12px 6px 28px;font-size:12px;color:var(--color-text-secondary);cursor:pointer;transition:background .1s;line-height:1.4}
.sb-subj:hover{background:var(--color-background-secondary)}
.sb-subj.active{color:var(--color-text-primary);font-weight:500}

.view-phase{display:none}
.view-phase.active{display:block}
.view-subject{display:none}
.view-subject.active{display:block}

.phase-overview{}
.ph-header{margin-bottom:1rem}
.ph-title{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.ph-meta{font-size:12px;color:var(--color-text-secondary);margin-top:3px}
.ph-why{font-size:13px;line-height:1.7;color:var(--color-text-primary);background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;margin-bottom:1rem}

.subj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;margin-bottom:1rem}
.subj-card{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;cursor:pointer;transition:background .15s}
.subj-card:hover{background:var(--color-background-secondary)}
.sc-num{font-size:10px;font-weight:500;margin-bottom:3px}
.sc-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.sc-dur{font-size:11px;color:var(--color-text-tertiary)}

.section-tabs{display:flex;border-bottom:.5px solid var(--color-border-tertiary);margin-bottom:1rem;overflow-x:auto;scrollbar-width:none}
.section-tabs::-webkit-scrollbar{display:none}
.stab{padding:7px 13px;font-size:12px;font-weight:500;color:var(--color-text-secondary);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.stab.on{color:var(--color-text-primary)}

.panel{display:none}.panel.on{display:block}

.unit-card{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:8px;overflow:hidden}
.unit-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer}
.u-num{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;flex-shrink:0}
.u-title{flex:1;font-size:13px;font-weight:500;color:var(--color-text-primary)}
.u-week{font-size:10px;color:var(--color-text-tertiary);font-family:var(--font-mono,monospace);flex-shrink:0}
.u-chev{font-size:10px;color:var(--color-text-tertiary);transition:transform .2s}
.unit-card.open .u-chev{transform:rotate(90deg)}
.unit-body{display:none;border-top:.5px solid var(--color-border-tertiary);padding:10px 12px}
.unit-card.open .unit-body{display:block}

.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:7px;margin-bottom:10px}
.topic-chip{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:7px 10px;font-size:12px;color:var(--color-text-primary)}
.tc-name{font-weight:500;margin-bottom:2px}
.tc-note{font-size:11px;color:var(--color-text-secondary)}

.insight-box{border-left:2px solid;border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;padding:8px 12px;font-size:12px;line-height:1.6;color:var(--color-text-primary);margin-top:8px}

.proj-item{border:.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px;margin-bottom:8px}
.proj-lv{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;display:inline-block;margin-bottom:5px}
.proj-name{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.proj-desc{font-size:12px;color:var(--color-text-secondary);line-height:1.5}

.res-row{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:.5px solid var(--color-border-tertiary)}
.res-row:last-child{border-bottom:none}
.res-type{font-size:10px;font-weight:500;padding:2px 7px;border-radius:99px;background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);flex-shrink:0;white-space:nowrap}
.res-name{font-size:12px;color:var(--color-text-primary);font-weight:500}
.res-sub{font-size:11px;color:var(--color-text-tertiary)}

.week-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.wk{font-size:10px;font-weight:500;font-family:var(--font-mono,monospace);padding:3px 8px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:.5px solid var(--color-border-tertiary);flex-shrink:0;color:var(--color-text-secondary);min-width:52px;text-align:center;white-space:nowrap}
.wk-task{font-size:12px;color:var(--color-text-primary);line-height:1.5}

.mistake-row{display:flex;gap:8px;margin-bottom:9px;align-items:flex-start}
.m-dot{width:16px;height:16px;border-radius:50%;background:var(--color-background-danger);color:var(--color-text-danger);font-size:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.m-text{font-size:12px;color:var(--color-text-primary);line-height:1.5}
.m-text b{font-weight:500}

.breadcrumb{font-size:11px;color:var(--color-text-tertiary);margin-bottom:1rem;cursor:pointer}
.breadcrumb span{color:var(--color-text-secondary)}
.breadcrumb span:hover{color:var(--color-text-primary)}
.subj-title-bar{display:flex;align-items:center;gap:10px;margin-bottom:.5rem}
.subj-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.subj-dur-badge{font-size:10px;font-weight:500;padding:3px 9px;border-radius:99px}

.mm-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;font-size:12px;font-style:italic;color:var(--color-text-primary);line-height:1.6;border-left:2px solid var(--color-border-secondary)}
</style>
</head>

<h2 class="sr-only">Complete 7-phase Solutions Architect Roadmap with full syllabuses for every subject</h2>

<div class="top-bar">
  <span class="app-title">Solutions Architect Roadmap</span>
  <div class="phase-pills" id="phase-pills"></div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="main"></div>
</div>

<script>
const PH = [
  {
    id:1, label:"Phase 1", title:"Core CS Foundations",
    subtitle:"Data Structures, OS, Networks, Databases, Math",
    duration:"6–12 months", color:{dot:"#378ADD",light:"#E6F1FB",dark:"#0C447C",mid:"#378ADD",border:"#185FA5"},
    why:"Every great architect has experienced the humbling moment when a production incident traces back to a fundamental they skipped. Knowing why quicksort degrades or how TCP handles packet loss isn't trivia — it's the diagnostic vocabulary you reach for at 3am during an outage.",
    subjects:[
      {
        id:"1-1", label:"1.1 Data Structures & Algorithms", duration:"6–8 wk",
        why:"Algorithmic decisions made decades ago underpin every database engine, load balancer, and distributed lock you'll ever build. Derive, don't memorise.",
        units:[
          {num:"U1",title:"Complexity & asymptotic analysis",week:"Wk 1",topics:[{n:"Big-O, Ω, Θ notation",d:"Formal definitions"},{n:"Recurrence relations",d:"Master theorem, substitution"},{n:"Amortised analysis",d:"Aggregate, accounting, potential"},{n:"Time vs space trade-offs",d:"Choosing between memory & cycles"}],insight:"Derive at least 5 complexities from scratch. Never memorise — derive.",ic:"#185FA5"},
          {num:"U2",title:"Linear structures",week:"Wk 1–2",topics:[{n:"Arrays & dynamic arrays",d:"Amortised O(1) append"},{n:"Linked lists",d:"Single/double, pointer arithmetic"},{n:"Stacks, queues, deque",d:"Array-backed & linked"},{n:"Circular buffer",d:"Critical for IoT message queues"}],insight:"Implement each from scratch, then read your stdlib source. The gap is the lesson.",ic:"#185FA5"},
          {num:"U3",title:"Trees & heaps",week:"Wk 2–3",topics:[{n:"BST & AVL trees",d:"Rotation proofs"},{n:"Red-black trees",d:"Linux scheduler, std::map"},{n:"B-trees & B+ trees",d:"Every database index"},{n:"Heaps & priority queues",d:"O(n) heapify"},{n:"Trie, segment tree",d:"Autocomplete, range queries"}],insight:"Draw every rotation by hand before writing code. This is what you'll reach for when reading database papers.",ic:"#185FA5"},
          {num:"U4",title:"Graphs",week:"Wk 3–4",topics:[{n:"BFS & DFS",d:"Connected components"},{n:"Dijkstra & Bellman-Ford",d:"Shortest paths"},{n:"Topological sort",d:"Dependency graphs, build systems"},{n:"MST — Prim's, Kruskal's",d:"Network cost optimisation"},{n:"Union-Find (DSU)",d:"O(α) effectively"}],insight:"Map graph algorithms to real systems: BFS=service discovery, Dijkstra=packet routing, topological sort=build systems.",ic:"#185FA5"},
          {num:"U5",title:"Sorting, hashing & DP",week:"Wk 4–6",topics:[{n:"Merge, quick, heap sort",d:"Derive all complexities"},{n:"Non-comparison sorts",d:"Counting, radix — O(n) cases"},{n:"Hash maps & consistent hashing",d:"Collision, load factor, virtual nodes"},{n:"Bloom filter & HyperLogLog",d:"Probabilistic structures"},{n:"Dynamic programming",d:"4-step protocol: subproblem, recurrence, base, order"}],insight:"QuickSort's worst-case O(n²) has caused real production outages. Know when randomised pivot matters.",ic:"#185FA5"},
        ],
        projects:[{l:"STARTER",n:"Algorithm visualiser",d:"Implement 15+ algorithms. Plot actual vs theoretical runtime on random and adversarial inputs."},{l:"INTERMEDIATE",n:"In-memory KV store",d:"Hash map from scratch with dynamic resizing. Benchmark against stdlib."},{l:"ADVANCED",n:"LSM-tree skeleton",d:"MemTable (skip list), SSTables on disk, compaction. Bridges DSA to database internals."}],
        resources:[{t:"BOOK",n:"CLRS — Introduction to Algorithms",s:"Chapters 1–17. Do exercises."},{t:"BOOK",n:"Algorithm Design Manual — Skiena",s:"War stories for real-world context."},{t:"COURSE",n:"MIT 6.006 + 6.046 (OCW)",s:"Free. Problem sets are the real value."},{t:"PRACTICE",n:"Neetcode 150 roadmap",s:"Focus on patterns, not grinding."}],
        schedule:[{p:"Wk 1",t:"Complexity + linear structures. Implement from scratch. Derive 10 complexities."},{p:"Wk 2",t:"Trees: BST, AVL. Draw rotations before coding."},{p:"Wk 3–4",t:"Graphs: BFS, DFS, Dijkstra, topological sort. Build route planner."},{p:"Wk 5–6",t:"Sorting + DP: 20 problems using 4-step protocol. Consistent hashing deep dive."}],
        mistakes:[{t:"Memorising without deriving",d:"Derive Big-O from recurrences. Do this once and it's permanent."},{t:"Skipping adversarial inputs",d:"Every algorithm has a worst-case trigger. Ask 'what breaks this?' for each one."},{t:"Treating hash maps as magic O(1)",d:"Collisions and rehashing make them O(n) when badly tuned."}],
        mentalModels:["Complexity as a budget: every operation spends from a fixed time/space account. Never overdraw.","Consistent hashing will reappear in Phase 4 distributed databases. Build the intuition now."]
      },
      {
        id:"1-2", label:"1.2 Operating Systems", duration:"5–7 wk",
        why:"When a production server mysteriously slows down, understanding OS internals is the difference between a 5-minute diagnosis and a 5-hour war room. Every process, thread, and page fault has a cost.",
        units:[
          {num:"U1",title:"Processes & threads",week:"Wk 1",topics:[{n:"Process abstraction & PCB",d:"Context switching, process states"},{n:"System calls",d:"Kernel vs user mode, ~1µs overhead"},{n:"fork(), exec(), wait()",d:"Copy-on-write semantics"},{n:"Threads vs processes",d:"Cost differences, C10K problem"}],insight:"Measure syscall overhead yourself: tight loop calling getpid() with perf stat. The ~1000ns gap is visceral.",ic:"#0F6E56"},
          {num:"U2",title:"CPU scheduling",week:"Wk 2",topics:[{n:"FIFO, SJF, Round Robin",d:"Derive trade-offs from metrics"},{n:"Multi-level feedback queue",d:"Priority queues that adapt"},{n:"Linux CFS",d:"vruntime, red-black tree runqueue"},{n:"Real-time scheduling",d:"EDF, RM — critical for IoT"}],insight:"Linux CFS uses a red-black tree (from DSA unit) ordered by vruntime. DSA and OS meet here.",ic:"#0F6E56"},
          {num:"U3",title:"Memory management",week:"Wk 2–3",topics:[{n:"Virtual memory & paging",d:"Page tables, TLB"},{n:"Page replacement",d:"LRU, Clock, Belady anomaly"},{n:"Demand paging",d:"Page faults, working set model"},{n:"mmap & huge pages",d:"Used in databases, shared memory IPC"}],insight:"A page fault costs ~100µs. A TLB miss costs ~10ns. These numbers should influence every large data structure decision.",ic:"#0F6E56"},
          {num:"U4",title:"Concurrency & sync",week:"Wk 3–4",topics:[{n:"Race conditions & critical sections",d:"Atomicity violations"},{n:"Mutex, semaphores, CV",d:"Correctness proofs, Mesa vs Hoare"},{n:"Deadlock",d:"Coffman conditions — prevention, detection"},{n:"Lock-free structures",d:"CAS, ABA problem, memory ordering"}],insight:"Deadlock's four conditions reappear in distributed systems. You'll use this again in Phase 4.",ic:"#0F6E56"},
          {num:"U5",title:"File systems & I/O",week:"Wk 4–6",topics:[{n:"inodes, VFS layer",d:"Abstraction over FS types"},{n:"Journaling & crash consistency",d:"Ordered vs writeback"},{n:"epoll & io_uring",d:"C10K solution, next-gen async I/O"},{n:"Containers",d:"cgroups + namespaces — what Docker does"}],insight:"epoll is why Node.js, nginx, Redis are single-threaded yet handle thousands of connections.",ic:"#0F6E56"},
        ],
        projects:[{l:"STARTER",n:"Mini shell",d:"fork/exec, pipes, I/O redirection, signal handling. Every feature needs a different syscall."},{l:"INTERMEDIATE",n:"Memory allocator",d:"malloc/free via sbrk. Bump allocator → free list → coalescing. Benchmark vs glibc."},{l:"ADVANCED",n:"FUSE file system",d:"In-memory FS: create/read/write/delete files. Add disk persistence layer."}],
        resources:[{t:"BOOK",n:"OS: Three Easy Pieces (OSTEP)",s:"Free at ostep.org. The best OS text for practitioners."},{t:"BOOK",n:"Linux Kernel Development — Robert Love",s:"Chapter-level overview of kernel subsystems."},{t:"COURSE",n:"MIT 6.S081 xv6 labs",s:"Build a real OS. The labs are the best OS hands-on in existence."},{t:"TOOL",n:"strace, perf, /proc",s:"Real OS learning happens by observing real systems."}],
        schedule:[{p:"Wk 1",t:"OSTEP Part 1 (processes). Mini shell. Instrument with strace."},{p:"Wk 2",t:"Scheduling. Study Linux CFS source. Map to red-black tree."},{p:"Wk 3",t:"Concurrency. Implement producer-consumer, readers-writers, dining philosophers."},{p:"Wk 4",t:"Memory management. Memory allocator project. Measure TLB misses with perf."},{p:"Wk 5–6",t:"File systems + I/O. FUSE project. epoll vs io_uring benchmark."}],
        mistakes:[{t:"Ignoring /proc",d:"/proc is a live kernel state view. Make it your first debugging tool, always."},{t:"Treating context switches as free",d:"A context switch costs 1,000–10,000ns. Tight loops switching 1,000 threads are slower than 10 async workers."},{t:"Not understanding copy-on-write",d:"fork() doesn't copy memory — CoW does it on first write. This is why Redis fork()-based persistence is fast until you start writing."}],
        mentalModels:["The OS as a hotel concierge: it manages scarce resources among demanding guests using scheduling policies.","Every Docker container is 7 Linux kernel features (namespaces + cgroups) composed together."]
      },
      {
        id:"1-3", label:"1.3 Computer Networks", duration:"4–5 wk",
        why:"Every web request, database query, and IoT sensor reading transits a network. The architect who treats networking as a black box will misdiagnose latency spikes and misunderstand why distributed transactions are hard.",
        units:[
          {num:"U1",title:"Architecture & physical layer",week:"Wk 1",topics:[{n:"OSI vs TCP/IP model",d:"Practical differences"},{n:"End-to-end argument",d:"Foundational design principle"},{n:"Ethernet, MAC, switches",d:"L2 forwarding, ARP"},{n:"Shannon's theorem",d:"C = B·log₂(1+S/N) — the ceiling"}],insight:"The end-to-end argument explains why TCP is in the OS, why NAT is a hack, and why retries belong in the application layer.",ic:"#993C1D"},
          {num:"U2",title:"IP & routing",week:"Wk 2",topics:[{n:"IPv4/IPv6 & CIDR",d:"Fragmentation, prefix notation"},{n:"Distance vector (RIP)",d:"Bellman-Ford, count-to-infinity"},{n:"Link state (OSPF)",d:"Dijkstra applied to networks"},{n:"BGP",d:"Path vector — how the internet routes"},{n:"SDN",d:"Programmable data planes"}],insight:"BGP misconfiguration caused the Facebook 2021 outage. Understanding BGP isn't academic — it's incident forensics.",ic:"#993C1D"},
          {num:"U3",title:"TCP & transport layer",week:"Wk 2–3",topics:[{n:"Three-way handshake",d:"SYN, SYN-ACK, ACK + teardown"},{n:"Flow & congestion control",d:"Sliding window, AIMD, CUBIC, BBR"},{n:"TCP HOL blocking",d:"Why HTTP/2 moved to QUIC"},{n:"UDP & QUIC",d:"When UDP wins; HTTP/3 transport"}],insight:"TCP congestion control (AIMD) is provably fair across competing flows. Understand it; you'll use it for backpressure design in Phase 4.",ic:"#993C1D"},
          {num:"U4",title:"Application layer & protocols",week:"Wk 3–4",topics:[{n:"HTTP/1.1, HTTP/2, HTTP/3",d:"Multiplexing, header compression"},{n:"DNS resolution",d:"Hierarchy, TTLs, DNS-over-HTTPS"},{n:"TLS internals",d:"Handshake, certificate chain"},{n:"MQTT",d:"IoT pub/sub — QoS levels 0/1/2"},{n:"gRPC & REST vs GraphQL",d:"When each wins"}],insight:"MQTT QoS levels map directly to distributed messaging guarantees you'll design in Phase 4. Learn them now.",ic:"#993C1D"},
        ],
        projects:[{l:"STARTER",n:"Packet analyser",d:"Raw sockets, parse Ethernet/IP/TCP headers, reassemble HTTP streams."},{l:"INTERMEDIATE",n:"HTTP server from scratch",d:"HTTP/1.1 in Go/Rust using raw TCP. Handle persistent connections. Benchmark vs nginx."},{l:"ADVANCED",n:"IoT MQTT broker",d:"Support QoS 0/1, topic subscriptions, retained messages, LWT. Connect real devices."}],
        resources:[{t:"BOOK",n:"Computer Networking: A Top-Down Approach",s:"Kurose & Ross. Wireshark labs are mandatory."},{t:"BOOK",n:"TCP/IP Illustrated Vol. 1 — Stevens",s:"Definitive TCP/IP reference."},{t:"COURSE",n:"Stanford CS144",s:"Build a TCP/IP stack from scratch in C++."},{t:"TOOL",n:"Wireshark, tcpdump, mtr",s:"No substitute for watching packets."}],
        schedule:[{p:"Wk 1",t:"OSI vs TCP/IP. Physical + data link. Capture and decode your own web traffic in Wireshark."},{p:"Wk 2",t:"IP + routing. Implement a toy routing table. Read Facebook 2021 outage post-mortem."},{p:"Wk 3",t:"TCP deep dive — handshake, congestion control. Build packet analyser."},{p:"Wk 4",t:"Application layer: DNS trace, TLS in Wireshark, MQTT. HTTP server + benchmark."},{p:"Wk 5",t:"QUIC internals, MQTT broker project, CDN architecture case study."}],
        mistakes:[{t:"Thinking TCP guarantees cross-connection ordering",d:"TCP guarantees ordering within one connection. Between connections: no guarantees. Many distributed bugs live here."},{t:"Ignoring DNS in latency budgets",d:"An uncached DNS lookup is 50–200ms. Often the invisible culprit in 'slow first request' complaints."},{t:"Assuming network calls are fast",d:"Cross-DC: 50–100ms. Cross-continent: 150–300ms. Synchronous service chains multiply these."}],
        mentalModels:["Networks as postal systems: packets are letters, IP is the zip code, TCP is certified mail that retries until delivery is confirmed.","Latency is physics: 1ms per 100km of fibre. A Sydney↔London round-trip is unavoidably ~250ms."]
      },
      {
        id:"1-4", label:"1.4 Databases", duration:"5–6 wk",
        why:"Databases are the memory of every application. Understanding how indexes work, why transactions are hard, and what the query planner is doing transforms you from someone who asks 'why is this slow?' to someone who already fixed it.",
        units:[
          {num:"U1",title:"Relational model & SQL",week:"Wk 1",topics:[{n:"Relational algebra",d:"Select, project, join — formal foundation"},{n:"Normalisation",d:"1NF → BCNF — when to and when not to"},{n:"Window functions & CTEs",d:"EXPLAIN ANALYZE on everything"},{n:"Null semantics",d:"Three-valued logic — the SQL gotcha"}],insight:"Run EXPLAIN ANALYZE on every query you write for the next month. The planner's decisions teach more than any book.",ic:"#72243E"},
          {num:"U2",title:"Storage & indexing",week:"Wk 2",topics:[{n:"B+ tree indexes",d:"Page splits, dominant index type"},{n:"LSM-tree storage",d:"RocksDB, Cassandra — write-optimised"},{n:"Column stores",d:"Parquet, DuckDB — analytical queries"},{n:"Write-ahead logging",d:"Crash recovery foundation"}],insight:"A B+ tree lookup is O(log_k n) disk reads. On 10B rows: 4 reads vs 10B without index. The difference is astronomical.",ic:"#72243E"},
          {num:"U3",title:"Query processing & optimisation",week:"Wk 2–3",topics:[{n:"Cost-based optimisation",d:"Statistics, cardinality estimation"},{n:"Join algorithms",d:"Nested loop, hash join, sort-merge"},{n:"Vectorised execution",d:"DuckDB/Snowflake vs Volcano model"},{n:"Index selectivity",d:"When the optimiser ignores your index"}],insight:"Query planner decisions are based on table statistics. Stale statistics cause bad plans. Run ANALYZE after bulk loads.",ic:"#72243E"},
          {num:"U4",title:"Transactions & concurrency",week:"Wk 3–4",topics:[{n:"ACID properties",d:"Formal definitions"},{n:"2PL & MVCC",d:"PostgreSQL snapshot isolation, xmin/xmax"},{n:"Isolation levels",d:"Anomalies at each level — commit to memory"},{n:"Serialisability",d:"Conflict serializability, precedence graphs"}],insight:"Most production 'data corruption' bugs are isolation level mismatches. Know which anomalies each level permits.",ic:"#72243E"},
          {num:"U5",title:"NoSQL & distributed DBs",week:"Wk 5–6",topics:[{n:"NoSQL data models",d:"KV, document, column-family, graph"},{n:"CAP theorem",d:"Preview of Subject 1.8"},{n:"Dynamo-style systems",d:"Consistent hashing, vector clocks, quorum"},{n:"Time-series DBs",d:"InfluxDB, TimescaleDB — IoT data model"}],insight:"Time-series databases are directly applicable to your IoT startup. Design your sensor data model here.",ic:"#72243E"},
        ],
        projects:[{l:"STARTER",n:"Query planner explainer",d:"EXPLAIN ANALYZE 10 slow queries. Document each plan node choice and what you'd change."},{l:"INTERMEDIATE",n:"KV store with B+ tree + WAL",d:"Extend DSA KV store with index, WAL, MVCC snapshot reads. Test crash recovery."},{l:"ADVANCED",n:"IoT time-series store",d:"Columnar storage, delta+RLE compression, downsampling, retention policies."}],
        resources:[{t:"BOOK",n:"Database Internals — Alex Petrov",s:"Best practical book on storage engines."},{t:"BOOK",n:"Designing Data-Intensive Applications",s:"Kleppmann. Chapters 1–4 directly relevant."},{t:"PAPER",n:"ARIES Recovery Method — Mohan et al.",s:"The foundational crash recovery paper."},{t:"PAPER",n:"Architecture of a Database System",s:"Hellerstein et al. Free PDF. Best architectural overview."}],

          {num:"U2",title:"Combinatorics & sets",week:"Wk 1–2",topics:[{n:"Counting principles",d:"Sum, product, inclusion-exclusion"},{n:"Permutations & combinations",d:"nPr, nCr — with/without repetition"},{n:"Pigeonhole principle",d:"Birthday paradox, hash collisions inevitable"}],insight:"The pigeonhole principle explains why hash collisions are inevitable and why consistent hashing needs virtual nodes.",ic:"#534AB7"},
          {num:"U3",title:"Graph theory",week:"Wk 2",topics:[{n:"Graph definitions",d:"Directed, weighted, bipartite"},{n:"Graph colouring",d:"Chromatic number — register allocation"},{n:"Network flow",d:"Max-flow min-cut — resource allocation"},{n:"Bipartite matching",d:"Task assignment, market design"}],insight:"Max-flow min-cut is used in network capacity planning, image segmentation, and resource allocation.",ic:"#534AB7"},

      {

        why:"Modern systems are probabilistic by design. Consistent hashing, Bloom filters, A/B testing, SLOs, and ML evaluation all require probabilistic reasoning. The engineer who thinks only in certainties is wrong about every system at scale.",
        units:[
          {num:"U1",title:"Probability foundations",week:"Wk 1",topics:[{n:"Kolmogorov axioms",d:"Formal probability foundation"},{n:"Conditional probability",d:"P(A|B), total probability theorem"},{n:"Bayes' theorem",d:"Prior, likelihood, posterior"},{n:"Law of large numbers",d:"Why averages stabilise"}],insight:"Bayes' theorem is the foundation of spam filters, intrusion detection, A/B test interpretation, and ML calibration.",ic:"#633806"},
          {num:"U2",title:"Distributions & CLT",week:"Wk 1–2",topics:[{n:"Discrete distributions",d:"Bernoulli, Binomial, Poisson"},{n:"Continuous distributions",d:"Normal, Exponential, Log-normal"},{n:"Heavy-tailed distributions",d:"Power law — latency & internet traffic"},{n:"Central Limit Theorem",d:"Foundation of statistical inference"},{n:"Queuing theory M/M/1",d:"Arrival, service, utilisation"}],insight:"Latency distributions are almost always log-normal or heavy-tailed, not Gaussian. Mean latency is a lie.",ic:"#633806"},
          {num:"U3",title:"Probabilistic algorithms",week:"Wk 2–3",topics:[{n:"Bloom filters",d:"False positive rate derivation"},{n:"Count-Min Sketch",d:"Frequency estimation in streams"},{n:"HyperLogLog",d:"Cardinality estimation — Redis PFCOUNT"},{n:"Reservoir sampling",d:"Uniform sampling from IoT streams"},{n:"Consistent hashing analysis",d:"Probability k/n keys remap on node change"}],insight:"HyperLogLog estimates distinct elements in a billion-item stream using 12KB of memory with 2% error.",ic:"#633806"},
          {num:"U4",title:"Statistics for systems",week:"Wk 3",topics:[{n:"Percentiles: p50, p95, p99, p999",d:"What SLOs actually measure"},{n:"Hypothesis testing & A/B tests",d:"p-values, confidence intervals"},{n:"Little's Law L=λW",d:"Queue length, throughput, latency"},{n:"Anomaly detection",d:"Z-score, IQR — alerting systems"}],insight:"Little's Law: if avg latency is 100ms and you want 1000 req/s, your avg queue depth must be 100 requests. This is capacity planning.",ic:"#633806"},
        ],
        projects:[{l:"STARTER",n:"Bloom filter implementation",d:"Derive and verify the false positive rate formula. Show optimal m/n ratio."},{l:"INTERMEDIATE",n:"Load balancer simulation",d:"Random vs round-robin vs power-of-two-choices. Measure tail latency improvement."},{l:"INTERMEDIATE",n:"A/B test engine",d:"Random assignment, sample size calculator, significance test, confidence intervals."}],
        resources:[{t:"BOOK",n:"Introduction to Probability — Blitzstein & Hwang",s:"Best for CS students. Free at probabilitybook.net."},{t:"COURSE",n:"MIT 6.041 (OCW)",s:"Excellent problem sets with engineering framing."},{t:"BOOK",n:"Think Stats — Allen Downey",s:"Free. Statistics for programmers. Real datasets."}],
        schedule:[{p:"Wk 1",t:"Probability foundations + distributions. Blitzstein ch. 1–5. Bloom filter + false positive derivation."},{p:"Wk 2",t:"Probabilistic algorithms: HyperLogLog, Count-Min, reservoir sampling. Load balancer simulation."},{p:"Wk 3",t:"Statistics for systems. A/B test engine. Latency percentile analysis. Little's Law applied to projects."},{p:"Wk 4",t:"Queuing theory. HDR histogram. Review and connect to all previous Phase 1 subjects."}],
        mistakes:[{t:"Using mean latency in SLOs",d:"A system with 99% at 1ms and 1% at 10s has 'mean' 110ms. Users feel the tail. Always monitor percentiles."},{t:"Misinterpreting p-values",d:"p < 0.05 does not mean 95% chance the result is real. Know the correct interpretation."},{t:"Treating all distributions as normal",d:"Network traffic, request rates, file sizes are power-law. Gaussian stats on power-law data gives catastrophically wrong estimates."}],
        mentalModels:["Reliability budget: every system has an error budget (1 - SLO). Spend it deliberately on innovation, not accidentally on incidents.","Cost as a fifth dimension: fast, reliable, secure, scalable — but unaffordable is still a failed system."]

      {
        id:"1-7", label:"1.7 Theory of Computation", duration:"3–4 wk",
        why:"Theory of computation defines the fundamental limits of what computers can and cannot do. NP-completeness tells you when to stop looking for a polynomial-time algorithm. Undecidability tells you what no amount of engineering can solve.",
        units:[
          {num:"U1",title:"Automata & formal languages",week:"Wk 1",topics:[{n:"DFA & NFA",d:"State machines — regex engines, lexers"},{n:"Regular languages",d:"Pumping lemma, closure properties"},{n:"Context-free grammars",d:"BNF, parse trees — SQL, JSON parsers"},{n:"Parsing algorithms",d:"LL, LR, Earley — how compilers parse"}],insight:"Every programming language parser and SQL engine is a context-free grammar recogniser. Build a tiny parser and demystify every parsing library.",ic:"#3B6D11"},
          {num:"U2",title:"Turing machines & computability",week:"Wk 2",topics:[{n:"Turing machine model",d:"Tape, head, transition function"},{n:"The halting problem",d:"What no algorithm can solve"},{n:"Rice's theorem",d:"No non-trivial program property is decidable"},{n:"Turing completeness",d:"Why SQL and CSS are Turing complete"}],insight:"The halting problem proves no general static analyser can determine if all programs terminate. This is why linters have false positives.",ic:"#3B6D11"},
          {num:"U3",title:"Complexity theory",week:"Wk 2–3",topics:[{n:"P vs NP",d:"The most important open problem in CS"},{n:"NP-completeness",d:"Cook-Levin, SAT — the hardness benchmark"},{n:"Approximation algorithms",d:"When exact is impossible — FPTAS, greedy bounds"},{n:"Practical NP-hard problems",d:"TSP, bin packing — appear in real scheduling"}],insight:"When you see a scheduling problem in production, NP-completeness intuition tells you immediately whether to look for exact or reach for heuristic.",ic:"#3B6D11"},
          {num:"U4",title:"Type theory intro",week:"Wk 3–4",topics:[{n:"Lambda calculus",d:"β-reduction — foundation of functional languages"},{n:"Hindley-Milner type inference",d:"How Haskell/Rust infer types"},{n:"Curry-Howard correspondence",d:"Types = propositions, programs = proofs"}],insight:"Rust's borrow checker is a type system proof that memory is managed correctly. Type theory is why it works.",ic:"#3B6D11"},
        ],
        projects:[{l:"STARTER",n:"Regex engine",d:"NFA from regex, convert to DFA, run on input. Compare performance to re2."},{l:"INTERMEDIATE",n:"JSON parser from scratch",d:"Recursive-descent parser, schema validation. Handle all JSON spec edge cases."},{l:"INTERMEDIATE",n:"NP-hardness explorer",d:"Prove an IoT scheduling problem NP-hard. Implement greedy approximation. Measure ratio."}],
        resources:[{t:"BOOK",n:"Introduction to Theory of Computation — Sipser",s:"Chapters 1–9. The definitive text. Very readable."},{t:"BOOK",n:"Computers & Intractability — Garey & Johnson",s:"NP-completeness bible. Reference for recognising NP-hard problems."},{t:"COURSE",n:"MIT 6.045J (OCW)",s:"Free lectures and problem sets."}],
        schedule:[{p:"Wk 1",t:"Automata: DFA, NFA, regex. Build regex engine. Prove 2 languages non-regular."},{p:"Wk 2",t:"Turing machines + halting problem proof. Rice's theorem implications."},{p:"Wk 3",t:"Complexity: P vs NP. Identify 3 NP-complete problems in your IoT startup use cases."},{p:"Wk 4",t:"Lambda calculus + type theory. Connect to Rust ownership model (Phase 3 preview)."}],
        mistakes:[{t:"Dismissing theory as academic",d:"NP-completeness shows up the moment you try to optimally schedule jobs or route vehicles. Recognise it early."},{t:"Conflating undecidable with unsolvable",d:"Static analysis tools solve undecidable problems heuristically every day. The distinction matters."}],
        mentalModels:["Undecidability = no algorithm works for all inputs, not that no algorithm works for most practical inputs.","NP-complete problems are everywhere in systems: job scheduling, bin packing, graph colouring for resource allocation."]
      },
      {
        id:"1-8", label:"1.8 CAP Theorem", duration:"2–3 wk",
        why:"CAP theorem is where Phase 1 theory meets Phase 4 distributed systems. Every database choice — Cassandra vs PostgreSQL, Redis vs ZooKeeper — is ultimately a CAP trade-off. Understanding it properly requires all 7 subjects before it.",
        units:[
          {num:"U1",title:"CAP theorem — formal",week:"Wk 1",topics:[{n:"Consistency (linearisability)",d:"Every read sees most recent write"},{n:"Availability",d:"Every request gets a non-error response"},{n:"Partition tolerance",d:"System operates despite network partitions"},{n:"Gilbert & Lynch proof",d:"Why you can only have two during a partition"}],insight:"In practice you always have P (partitions happen). The real choice: during a partition, return stale data (AP) or error (CP)?",ic:"#5F5E5A"},
          {num:"U2",title:"Consistency models spectrum",week:"Wk 1–2",topics:[{n:"Linearisability",d:"Strongest — operations appear instantaneous"},{n:"Causal consistency",d:"Causally related operations ordered"},{n:"Eventual consistency",d:"Replicas converge given no new updates"},{n:"PACELC model",d:"Latency/consistency trade-off always exists"}],insight:"'We use eventual consistency' tells you almost nothing. Ask which specific consistency model and what the conflict resolution strategy is.",ic:"#5F5E5A"},
          {num:"U3",title:"Real-world classifications",week:"Wk 2",topics:[{n:"CP systems",d:"ZooKeeper, etcd — consistency over availability"},{n:"AP systems",d:"Cassandra, DynamoDB — availability over consistency"},{n:"Quorum reads/writes",d:"W + R > N — the quorum condition"},{n:"CRDTs",d:"Conflict-free replicated types — eventual consistency right"}],insight:"Cassandra's consistency level is tunable per-query. QUORUM gives consistency. LOCAL_ONE gives speed. You choose at query time.",ic:"#5F5E5A"},
          {num:"U4",title:"Failure detection",week:"Wk 2–3",topics:[{n:"Split-brain",d:"Two leaders, data divergence — the nightmare"},{n:"Vector clocks",d:"Causality tracking — Dynamo conflict detection"},{n:"Gossip protocol",d:"Decentralised failure detection"},{n:"Phi Accrual detector",d:"Cassandra's adaptive failure detection"}],insight:"Split-brain is the nightmare of distributed systems. A network partition where both nodes accept writes requires a merge — or data loss.",ic:"#5F5E5A"},
        ],
        projects:[{l:"STARTER",n:"CAP decision matrix",d:"Document 10 real distributed systems. For each: CAP choice, consistency model, correct use case, wrong use case."},{l:"INTERMEDIATE",n:"Eventual consistency simulator",d:"3-node KV store with configurable partitions. Implement LWW. Observe divergence and convergence. Add vector clocks."},{l:"ADVANCED",n:"IoT CAP design document",d:"For each data type in your startup (device state, sensor readings, config), explicitly choose a consistency model and justify with CAP/PACELC."}],
        resources:[{t:"PAPER",n:"Brewer's CAP Theorem + Gilbert & Lynch",s:"Read both: the conjecture and its proof."},{t:"PAPER",n:"CAP Twelve Years Later — Brewer 2012",s:"Brewer's nuanced refinement. CAP is not binary."},{t:"PAPER",n:"PACELC — Daniel Abadi 2012",s:"The more practical model. Latency/consistency trade-off always exists."},{t:"BOOK",n:"DDIA — Kleppmann, Chapter 9",s:"Most practical treatment of consistency for engineers."}],
        schedule:[{p:"Wk 1",t:"CAP theorem. Gilbert & Lynch proof. PACELC paper. Classify 10 real systems."},{p:"Wk 2",t:"Consistency models. Brewer 2012 refinement. Eventual consistency simulator."},{p:"Wk 3",t:"IoT CAP design doc for your startup. CRDTs. Connect all 8 Phase 1 subjects."}],
        mistakes:[{t:"Treating CAP as a one-time design decision",d:"Consistency requirements vary per operation. Read user profile = eventual OK. Charge credit card = must be linearisable."},{t:"Choosing AP without a conflict resolution strategy",d:"'Eventual consistency' without a merge strategy means 'we hope it works out'. Define it explicitly."}],
        mentalModels:["CAP requires OS knowledge (processes), networks (partitions), databases (consistency), probability (quorum math). It is Phase 1's synthesis subject.","'CP or AP' is a false binary. You choose what happens during a partition, which is rare. Design for the normal case first."]
      },

  {
    id:2, label:"Phase 2", title:"Systems & Software Engineering",
    subtitle:"Design Patterns, Clean Architecture, Concurrency",
    duration:"3–5 months", color:{dot:"#1D9E75",light:"#E1F5EE",dark:"#085041",mid:"#1D9E75",border:"#0F6E56"},
    why:"This phase is where you learn to build systems that other engineers can reason about, maintain, and extend six months later. The shift from 'making it work' to 'making it right' is the difference between a senior engineer and an architect.",
    subjects:[
      {id:"2-1",label:"2.1 OOP & Design Patterns",duration:"4–5 wk",why:"Patterns are solutions to specific forces in context. Learning them without context trains only pattern-matching, not design thinking.",

        projects:[{l:"STARTER",n:"Design patterns catalogue",d:"All 23 GoF patterns with real-world use cases. Code review each."},{l:"INTERMEDIATE",n:"Plugin architecture",d:"Build an extensible system using Strategy + Factory. Add 3 plugins without modifying core."}],
        resources:[{t:"BOOK",n:"Design Patterns — GoF",s:"Timeless. Study with context, not as a shopping list."},{t:"BOOK",n:"A Philosophy of Software Design — Ousterhout",s:"Short, sharp, corrects popular misunderstandings."}],
        schedule:[{p:"Wk 1",t:"SOLID deep dive. Refactor an existing project. Write before/after analysis."},{p:"Wk 2–4",t:"GoF patterns — 3/week with real use cases."}],
        mistakes:[{t:"Pattern matching without context",d:"Applying Singleton because it's familiar, not because the problem calls for it."},{t:"Over-abstracting prematurely",d:"Wait for the third use case before abstracting. Two is coincidence."}],
        mentalModels:["Coupling as gravitational pull: every dependency makes two components harder to change independently.","Architecture as deferred decisions: maximise the options you keep open, not the ones you commit to early."]
      },
      {id:"2-2",label:"2.2 Clean Architecture",duration:"3–4 wk",why:"Clean architecture is the structural principle that makes large systems maintainable. Without it, every feature addition increases complexity non-linearly.",
        units:[{num:"U1",title:"Layered architecture",week:"Wk 1",topics:[{n:"Ports & adapters (Hexagonal)",d:"Business logic isolated from I/O"},{n:"Dependency rule",d:"Dependencies point inward only"},{n:"Bounded contexts",d:"DDD — shared kernel, anti-corruption layer"}],insight:"The dependency rule is the single most important principle in architecture: dependencies always point toward higher-level policy.",ic:"#0F6E56"},{num:"U2",title:"Domain-Driven Design",week:"Wk 2–3",topics:[{n:"Ubiquitous language",d:"Code and domain expert speak the same language"},{n:"Aggregates & entities",d:"Consistency boundaries"},{n:"Domain events",d:"Decoupled communication within a domain"},{n:"Strategic DDD",d:"Context maps, bounded context relationships"}],insight:"Conway's Law: your architecture mirrors your org chart. DDD gives you a principled way to align the two.",ic:"#0F6E56"}],
        projects:[{l:"INTERMEDIATE",n:"Refactor a monolith",d:"Take an existing codebase and extract bounded contexts using hexagonal architecture."},{l:"ADVANCED",n:"DDD-designed service",d:"Design and build a service with full DDD: entities, aggregates, domain events, ports & adapters."}],
        resources:[{t:"BOOK",n:"Clean Architecture — Robert C. Martin",s:"Read SOLID chapters twice."},{t:"BOOK",n:"Domain-Driven Design — Eric Evans",s:"The blue book. Dense but definitive."}],
        schedule:[{p:"Wk 1–2",t:"Clean Architecture book. Refactor project."},{p:"Wk 3–4",t:"DDD deep dive. Design IoT startup domain model using DDD vocabulary."}],
        mistakes:[{t:"Ignoring the data model",d:"Beautiful code on a broken schema. The data model outlives the code by years. Design it first."},{t:"DDD as a technical pattern",d:"DDD is a communication tool first. If you're not talking to domain experts, you're doing it wrong."}],
        mentalModels:["The dependency rule: outer layers know about inner layers. Inner layers know nothing about outer layers — ever.","Bounded contexts are team boundaries. Two teams sharing a context = coordination overhead."]
      },
      {id:"2-3",label:"2.3 Concurrency & Backend Design",duration:"4–5 wk",why:"Concurrency is where simple systems become complex. Every web server, database, and message broker is a concurrent system. Understanding this layer is what makes backend engineers into backend architects.",
        units:[{num:"U1",title:"Concurrency patterns",week:"Wk 1–2",topics:[{n:"Thread pools & work queues",d:"Fixed vs dynamic sizing"},{n:"Actor model",d:"Erlang/Akka — message-passing concurrency"},{n:"CSP & goroutines",d:"Go's concurrency model"},{n:"Async/await & event loops",d:"Node.js, Python asyncio, Rust tokio"}],insight:"The actor model eliminates shared mutable state — each actor owns its state exclusively. This is the insight behind Erlang's 9-nines availability.",ic:"#0F6E56"},{num:"U2",title:"Scalable backend patterns",week:"Wk 3–5",topics:[{n:"Caching patterns",d:"Cache-aside, write-through, write-behind"},{n:"Connection pools",d:"Pool sizing — Little's Law applied"},{n:"Circuit breaker & bulkhead",d:"Failure isolation patterns"},{n:"Rate limiting",d:"Token bucket, leaky bucket — algorithms"}],insight:"A circuit breaker in software mirrors an electrical circuit breaker: it trips when failures exceed a threshold, preventing cascade.",ic:"#0F6E56"}],
        projects:[{l:"INTERMEDIATE",n:"URL shortener",d:"REST API, caching layer, rate limiting, analytics. Deploy and measure latency under load."},{l:"INTERMEDIATE",n:"Real-time chat system",d:"WebSocket server, message fan-out, presence, persistence. Handle 10k concurrent connections."},{l:"ADVANCED",n:"Ride-sharing dispatch engine",d:"Location matching, surge pricing, trip state machine. Full system design doc required."}],
        resources:[{t:"BOOK",n:"Designing Data-Intensive Applications — Kleppmann",s:"Chapters 1–4 for this phase."},{t:"BOOK",n:"System Design Interview — Alex Xu",s:"Use as project idea generator."}],
        schedule:[{p:"Wk 1–2",t:"Concurrency: implement thread pool, actor system, async HTTP server."},{p:"Wk 3",t:"URL shortener project: start simple, add complexity iteratively."},{p:"Wk 4",t:"Real-time chat system. Focus on concurrency model. Benchmark WebSocket throughput."},{p:"Wk 5",t:"Ride-sharing design doc (2 wk), then implementation."}],

    why:"Most engineers treat the kernel as magic. Architects who understand what happens below the syscall boundary make fundamentally different decisions about data serialisation, I/O patterns, and observability. This is what separates engineers who guess at performance from those who measure and understand it.",
    subjects:[

        mistakes:[{t:"Reaching for unsafe prematurely",d:"The borrow checker is finding real bugs. Fight it honestly before using unsafe."},{t:"Boxing futures unnecessarily",d:"Dynamic dispatch via Box<dyn Future> negates zero-cost async. Use generics where possible."}],

      },
      {id:"3-2",label:"3.2 Linux Internals & eBPF",duration:"5–6 wk",why:"eBPF lets you observe anything happening in the kernel without modifying it. Combined with deep Linux knowledge, it gives you superpowers in production debugging and observability.",
        units:[{num:"U1",title:"Linux internals deep dive",week:"Wk 1–3",topics:[{n:"Linux scheduler internals",d:"CFS vruntime, runqueue management"},{n:"Network stack internals",d:"sk_buff, netfilter, XDP"},{n:"Memory subsystem",d:"NUMA, huge pages, memory compaction"},{n:"VFS & block layer",d:"How file I/O reaches the disk"}],insight:"strace shows you every syscall a process makes. Reading strace output fluently is a superpower you'll use weekly.",ic:"#712B13"},{num:"U2",title:"eBPF programming",week:"Wk 3–5",topics:[{n:"eBPF architecture",d:"Verifier, JIT compiler, maps"},{n:"Kprobes & tracepoints",d:"Attaching to kernel functions"},{n:"XDP & TC hooks",d:"High-performance packet processing"},{n:"bpftrace scripting",d:"One-liners for production debugging"},{n:"Cilium & Pixie",d:"eBPF in production — service mesh, observability"}],insight:"eBPF is the microscope of modern observability. You can observe anything in the kernel without modifying application code.",ic:"#712B13"}],
        projects:[{l:"INTERMEDIATE",n:"eBPF network monitor",d:"Trace TCP connections, per-process network I/O, port scan detection — without modifying app code."},{l:"ADVANCED",n:"Custom Linux scheduler simulation",d:"CFS-like scheduler in userspace. Simulate preemption, context switch cost, vruntime accounting."}],
        resources:[{t:"BOOK",n:"Systems Performance — Brendan Gregg",s:"The bible of Linux performance. Every chapter is a career asset."},{t:"BOOK",n:"BPF Performance Tools — Brendan Gregg",s:"Comprehensive eBPF reference with 150+ tools."},{t:"BOOK",n:"Linux Kernel Development — Robert Love",s:"Best intro to kernel subsystems."}],
        schedule:[{p:"Wk 1–3",t:"Linux internals: Love's book ch. 1–10. Syscall tracing. Study /proc and /sys."},{p:"Wk 3–5",t:"eBPF: Gregg's book ch. 1–8. Build network monitor. Write 5+ bpftrace scripts."},{p:"Wk 6",t:"XDP packet processing. Scheduler simulation project."}],
        mistakes:[{t:"Profiling in the wrong environment",d:"Micro-benchmarks ignoring NUMA topology or CPU frequency scaling mislead more than they inform."},{t:"Assuming syscalls are free",d:"A tight loop with individual 1-byte read() calls is catastrophically slower than one buffered read."}],
        mentalModels:["Memory hierarchy: registers (0.3ns) → L1 (1ns) → L2 (3ns) → L3 (10ns) → RAM (100ns) → SSD (100µs). Every algorithm decision should consider where data lives.","The kernel as a trusted intermediary: every syscall is a context switch costing ~1000ns. Batch them."]
      },
      {id:"3-3",label:"3.3 Performance Engineering",duration:"3–4 wk",why:"Performance engineering is not about premature optimisation. It's about having a methodology for finding real bottlenecks and a vocabulary for understanding them.",
        units:[{num:"U1",title:"Profiling & measurement",week:"Wk 1–2",topics:[{n:"perf + flamegraphs",d:"CPU profiling, off-CPU analysis"},{n:"Cache miss analysis",d:"perf stat -e cache-misses"},{n:"Branch misprediction",d:"CPU pipeline stalls"},{n:"Latency vs throughput",d:"They trade off differently"}],insight:"Flamegraphs were invented by Brendan Gregg. Every wide tower is a bottleneck. Learn to read them in 30 seconds.",ic:"#712B13"},{num:"U2",title:"Low-level optimisation",week:"Wk 2–4",topics:[{n:"Cache-friendly data structures",d:"AoS vs SoA, struct padding"},{n:"SIMD vectorisation",d:"Auto-vectorisation, AVX2 intrinsics"},{n:"Zero-copy I/O",d:"sendfile, mmap, DMA"},{n:"Lock-free programming",d:"Memory ordering: relaxed, acquire, release, seq_cst"}],insight:"Struct padding and AoS vs SoA layout can 10x performance on hot loops by eliminating cache misses. Measure first.",ic:"#712B13"}],
        projects:[{l:"INTERMEDIATE",n:"Performance audit",d:"Profile any previous project. Generate flamegraph. Identify top 3 bottlenecks. Fix all 3. Document before/after."},{l:"ADVANCED",n:"Zero-copy file server",d:"Serve large files using sendfile and io_uring. Measure throughput vs naive read/write implementation."}],
        resources:[{t:"BOOK",n:"Systems Performance — Brendan Gregg",s:"The definitive reference. USE method for every resource."},{t:"TOOL",n:"perf, flamegraph.pl, bpftrace",s:"Learn these on a real system, not a VM."}],
        schedule:[{p:"Wk 1",t:"Gregg's USE method. perf stat, perf record, flamegraph generation on existing projects."},{p:"Wk 2",t:"Cache analysis. Rewrite one data structure for better locality. Measure improvement."},{p:"Wk 3–4",t:"SIMD + zero-copy I/O. Zero-copy file server project."}],
        mistakes:[{t:"Optimising before measuring",d:"Intuition about bottlenecks is wrong ~70% of the time. Always profile first."},{t:"Ignoring cache locality",d:"Storing related data non-contiguously causes cache misses that dominate runtime."}],
        mentalModels:["The USE method: Utilisation, Saturation, Errors — apply to every resource before concluding anything about performance.","Every wide tower in a flamegraph is a bottleneck. Every thin tower is fine. Read width, not height."]
      },
    ]
  },
  {
    id:4, label:"Phase 4", title:"Distributed Systems & Large-Scale Architecture",
    subtitle:"CAP Applied, Microservices, Fault Tolerance, Petabyte Scale",
    duration:"5–7 months", color:{dot:"#D4537E",light:"#FBEAF0",dark:"#72243E",mid:"#D4537E",border:"#993556"},
    why:"The leap to distributed systems is where most engineers hit an invisible wall. The rules change: you can't assume messages deliver, clocks agree, or nodes stay alive. Every design decision has a failure mode with a probability. Architects at this level build systems that degrade gracefully.",
    subjects:[
      {id:"4-1",label:"4.1 Consensus & Replication",duration:"5–6 wk",why:"Consensus is how distributed systems agree on anything. Without understanding Raft or Paxos, you're using ZooKeeper and etcd as black boxes — which means you can't debug them when they misbehave.",
        units:[{num:"U1",title:"Consensus algorithms",week:"Wk 1–3",topics:[{n:"Raft — leader election",d:"Term numbers, RequestVote RPC"},{n:"Raft — log replication",d:"AppendEntries, commit index"},{n:"Raft — safety proofs",d:"Why two leaders can't commit in the same term"},{n:"Multi-Paxos",d:"How it differs from Raft conceptually"},{n:"Byzantine fault tolerance",d:"When nodes can lie — PBFT"}],insight:"Build Raft from scratch. Pass the TLA+ spec tests. Observe split-brain scenarios and recovery. This is the most educational distributed systems exercise in existence.",ic:"#72243E"},{num:"U2",title:"Replication patterns",week:"Wk 4–6",topics:[{n:"Single-leader replication",d:"WAL shipping, semi-synchronous"},{n:"Multi-leader replication",d:"Conflict detection, CRDTs"},{n:"Leaderless replication",d:"Dynamo-style, quorum reads/writes"},{n:"Anti-entropy & read repair",d:"How replicas catch up"}],insight:"Replication lag is the source of 80% of distributed database bugs. Measure it, alert on it, and design for it being non-zero.",ic:"#72243E"}],
        projects:[{l:"INTERMEDIATE",n:"Raft implementation",d:"Build Raft in Go or Rust. Complete MIT 6.824 lab 2."},{l:"ADVANCED",n:"Distributed KV store",d:"3-node cluster with consistent hashing, anti-entropy, read-repair. MIT 6.824 lab 3."}],
        resources:[{t:"PAPER",n:"In Search of an Understandable Consensus Algorithm (Raft)",s:"raft.github.io — read the extended paper."},{t:"PAPER",n:"Dynamo: Amazon's Highly Available KV Store",s:"Foundational. Every distributed DB borrows from it."},{t:"COURSE",n:"MIT 6.824 Distributed Systems",s:"Labs are the best distributed systems hands-on in existence."}],
        schedule:[{p:"Wk 1–4",t:"Raft paper + implementation. MIT 6.824 labs 1–2. Budget 20+ hours per lab."},{p:"Wk 5–6",t:"Replication patterns. DDIA chapters 5–6. Distributed KV store."}],
        mistakes:[{t:"Conflating availability with reliability",d:"A system can be 99.9% available but still lose data. Durability, availability, reliability are separate axes."},{t:"Not testing the partition case",d:"Most engineers never simulate network partitions. This is where the real bugs live."}],
        mentalModels:["Networks lie: packets get delayed, reordered, duplicated, dropped. Design as if any message can be delivered zero or infinite times.","Time is a social construct: clocks drift. Use logical clocks for causality, not wall clocks."]
      },
      {id:"4-2",label:"4.2 Microservices & Event-Driven",duration:"4–5 wk",why:"Microservices are a team-topology strategy as much as a technical one. Event-driven architecture is how decoupled services communicate without tight coupling.",
        units:[{num:"U1",title:"Microservices patterns",week:"Wk 1–2",topics:[{n:"Service decomposition",d:"Bounded contexts as service boundaries"},{n:"API gateway pattern",d:"Routing, auth, rate limiting at the edge"},{n:"Service mesh",d:"Istio/Linkerd — mTLS, circuit breaking, observability"},{n:"Saga pattern",d:"Distributed transactions without 2PC"}],insight:"Conway's Law means your microservices will mirror your org chart — for better or worse. Design your services as you design your team boundaries.",ic:"#72243E"},{num:"U2",title:"Event-driven architecture",week:"Wk 3–5",topics:[{n:"Event sourcing",d:"State as a sequence of events"},{n:"CQRS",d:"Command/query separation"},{n:"Kafka deep dive",d:"Partitions, consumer groups, offset management"},{n:"Exactly-once semantics",d:"Idempotency keys, transactional outbox"},{n:"Outbox pattern",d:"Reliable event publishing without 2PC"}],insight:"The outbox pattern solves the dual-write problem: write to your DB and publish an event atomically using the same transaction.",ic:"#72243E"}],
        projects:[{l:"INTERMEDIATE",n:"Event-driven order system",d:"Order service, inventory service, payment service — communicating via Kafka. Implement saga for rollback."},{l:"ADVANCED",n:"CQRS + event sourcing",d:"Command side writes events. Query side materialises views. Time-travel debugging via event replay."}],
        resources:[{t:"BOOK",n:"Designing Data-Intensive Applications — Kleppmann",s:"Chapters 7–9 (transactions, consistency, stream processing)."},{t:"BOOK",n:"Building Microservices — Sam Newman",s:"The definitive microservices reference."}],
        schedule:[{p:"Wk 1–2",t:"Microservices patterns. Saga implementation. Service mesh setup."},{p:"Wk 3–5",t:"Kafka deep dive. Outbox pattern. Event-driven order system project."}],
        mistakes:[{t:"Microservices as the default",d:"5 engineers + 20 microservices = coordination hell. Services should align with team boundaries."},{t:"Eventual consistency without conflict resolution",d:"Choosing AP without defining the merge strategy. This is where data corruption hides."}],
        mentalModels:["Failure is the default: a 1000-node system sees a disk failure every 3 days. Design for failure as the expected case.","Event sourcing: state is a snapshot of events. Events are facts; they never change."]
      },
      {id:"4-3",label:"4.3 Large-Scale System Design",duration:"4–5 wk",why:"Designing systems at YouTube or Uber scale requires applying everything from Phases 1–4 simultaneously: algorithms for data structures, OS for I/O, networks for latency, databases for storage, probability for load distribution, and distributed systems for fault tolerance.",
        units:[{num:"U1",title:"Petabyte-scale storage",week:"Wk 1–2",topics:[{n:"Data partitioning strategies",d:"Range, hash, directory partitioning"},{n:"Sharding & resharding",d:"Hot-spot avoidance, online resharding"},{n:"Columnar storage at scale",d:"Parquet, ORC, tiered storage"},{n:"Object storage",d:"S3 internals — eventual consistency, multipart"}],insight:"Online resharding (moving data while serving traffic) is one of the hardest distributed operations. Pinterest, Uber, and Stripe have all written post-mortems about it.",ic:"#72243E"},{num:"U2",title:"Stream processing at scale",week:"Wk 3–5",topics:[{n:"Lambda vs Kappa architecture",d:"Batch + stream vs stream-only"},{n:"Apache Flink internals",d:"Checkpointing, watermarks, state backends"},{n:"Exactly-once stream processing",d:"Chandy-Lamport distributed snapshots"},{n:"Real-time aggregation",d:"Time windows, out-of-order events"}],insight:"Flink's checkpointing is based on the Chandy-Lamport distributed snapshot algorithm from 1985. Old theory, new application.",ic:"#72243E"}],
        projects:[{l:"ADVANCED",n:"YouTube-scale video pipeline",d:"Upload, transcoding, CDN distribution, recommendation pipeline. Design doc: 500 hours uploaded/minute."},{l:"ADVANCED",n:"Ride-sharing at Uber scale",d:"Real-time geospatial matching, surge pricing (stream), trip state (event sourcing), driver supply forecast."}],
        resources:[{t:"PAPER",n:"Google MapReduce, Bigtable, GFS trilogy",s:"Historical but still the clearest explanation of distributed patterns."},{t:"BOOK",n:"Understanding Distributed Systems — Vitillo",s:"Practical and concise. Best bridge from theory to implementation."},{t:"COURSE",n:"MIT 6.824 Distributed Systems",s:"All labs completed in this phase."}],
        schedule:[{p:"Wk 1–2",t:"Petabyte-scale storage patterns. YouTube design doc."},{p:"Wk 3–5",t:"Stream processing: Flink deep dive. Ride-sharing design + implementation."}],
        mistakes:[{t:"Designing perfect systems",d:"At scale, everything fails. Design for graceful degradation, not perfection."},{t:"Ignoring the network partition case",d:"CAP theorem is about what happens during a partition. Use chaos engineering from day one."}],
        mentalModels:["At petabyte scale, you don't ask 'will this fail?' — you ask 'how will this fail and what's the blast radius?'","System design is the art of making explicit trade-offs. Never let trade-offs remain implicit."]
      },
    ]
  },
  {
    id:5, label:"Phase 5", title:"Data Engineering & AI/ML Systems",
    subtitle:"Pipelines, Vector DBs, LLM-Ops, Agentic Workflows",
    duration:"4–6 months", color:{dot:"#7F77DD",light:"#EEEDFE",dark:"#3C3489",mid:"#7F77DD",border:"#534AB7"},
    why:"Data is now the primary product of most digital systems. Architects who cannot reason about data quality, model deployment, vector search, or agent reliability are designing systems that will age poorly. This phase is about building production-grade AI systems, not experimenting in notebooks.",
    subjects:[
      {id:"5-1",label:"5.1 Data Engineering",duration:"4–5 wk",why:"Data pipelines are software systems. They have bugs, they fail, they accumulate technical debt. Treat them like software — with tests, observability, and versioning.",
        units:[{num:"U1",title:"Data pipeline architecture",week:"Wk 1–2",topics:[{n:"ETL vs ELT",d:"Push vs pull, transformation location"},{n:"Medallion architecture",d:"Bronze/silver/gold — data quality layers"},{n:"dbt & SQL transformations",d:"Version-controlled, tested data transformations"},{n:"Data lineage",d:"Tracking data provenance end-to-end"},{n:"Data quality",d:"Schema validation, null checks, row counts"}],insight:"A pipeline that fails silently is worse than one that doesn't run. Instrument everything: row counts, null rates, schema drift. Fail loudly.",ic:"#3C3489"},{num:"U2",title:"Batch & stream processing",week:"Wk 3–5",topics:[{n:"Apache Airflow / Prefect",d:"DAG orchestration, retries, backfill"},{n:"Apache Spark",d:"RDD vs DataFrame, partition strategy"},{n:"Apache Flink for data engineering",d:"Real-time ETL, CDC"},{n:"Change data capture",d:"Debezium — streaming DB changes to pipelines"}],insight:"CDC (change data capture) is how you stream database changes to data pipelines without polling. Essential for real-time data products.",ic:"#3C3489"}],
        projects:[{l:"INTERMEDIATE",n:"Production data pipeline",d:"Airflow/Prefect pipeline: ingest→clean→transform→serve. Data quality checks, lineage tracking, alerting."},{l:"ADVANCED",n:"Real-time IoT analytics pipeline",d:"CDC from device DB → Flink transformation → analytical store. Sub-second latency."}],
        resources:[{t:"BOOK",n:"Fundamentals of Data Engineering — Reis & Housley",s:"The definitive modern data engineering reference."},{t:"TOOL",n:"dbt, Airflow, Spark, Debezium",s:"Learn one orchestrator and one streaming framework deeply."}],
        schedule:[{p:"Wk 1–2",t:"Fundamentals book + medallion architecture. Set up dbt + Airflow locally. Build pipeline."},{p:"Wk 3–5",t:"Stream processing. Flink + CDC. IoT analytics pipeline."}],
        mistakes:[{t:"Building pipelines without observability",d:"Silent failures corrupt data for months. Instrument row counts, null rates, schema drift on every stage."},{t:"Not versioning data schemas",d:"Schema changes break downstream consumers silently. Use schema registry."}],
        mentalModels:["Data quality as compound interest: a small schema violation silently corrupts downstream models for months before detection.","Data pipelines are software. Test them, observe them, version them."]
      },
      {id:"5-2",label:"5.2 ML Systems & LLM-Ops",duration:"5–6 wk",why:"Production ML is fundamentally different from research ML. Models drift, data distributions shift, inference costs scale, and evaluation is non-trivial. This subject teaches you to build ML systems that survive contact with production.",
        units:[{num:"U1",title:"ML model lifecycle",week:"Wk 1–3",topics:[{n:"Feature stores",d:"Point-in-time correct features, online vs offline"},{n:"Experiment tracking",d:"MLflow, Weights & Biases"},{n:"Model registry",d:"Versioning, lineage, approval workflows"},{n:"A/B testing models",d:"Shadow mode, canary, champion/challenger"},{n:"Model monitoring",d:"Data drift, concept drift, prediction drift"}],insight:"Feature stores solve the training-serving skew problem: the most common source of ML bugs in production.",ic:"#3C3489"},{num:"U2",title:"LLM systems & agentic workflows",week:"Wk 3–6",topics:[{n:"RAG architecture",d:"Chunking, embedding, retrieval, reranking"},{n:"Vector databases",d:"HNSW, IVF, PQ compression — ANN algorithms"},{n:"LLM evaluation",d:"Faithfulness, context precision, answer relevancy"},{n:"LLM-Ops",d:"Prompt versioning, cost attribution, semantic caching"},{n:"Agentic systems",d:"Tool use, multi-agent orchestration, memory, planning"},{n:"Cost optimisation",d:"Model routing, batching, speculative decoding"}],insight:"LLMs are probabilistic functions: same input → different outputs. Design systems robust to non-determinism rather than fighting it.",ic:"#3C3489"}],
        projects:[{l:"INTERMEDIATE",n:"RAG system with evaluation",d:"Build RAG over large document corpus. Add evals: faithfulness, context precision, answer relevancy."},{l:"ADVANCED",n:"Multi-agent research system",d:"4+ specialised agents (search, code, fact-check, summarise). Add memory and planning. Human-in-the-loop."},{l:"ADVANCED",n:"Cost-optimised LLM serving platform",d:"Request routing (small vs large model), semantic caching, batch inference, cost attribution per team."}],
        resources:[{t:"BOOK",n:"Designing Machine Learning Systems — Chip Huyen",s:"Production ML, not research ML. The definitive reference."},{t:"COURSE",n:"Full Stack Deep Learning",s:"fullstackdeeplearning.com — production ML systems focus."},{t:"PAPER",n:"Attention Is All You Need — Vaswani et al.",s:"Still the foundation. Understand every equation."}],
        schedule:[{p:"Wk 1–3",t:"ML lifecycle. Feature stores, experiment tracking. RAG system with evals."},{p:"Wk 4–6",t:"LLM-Ops tooling. Multi-agent system. Cost optimisation platform."}],
        mistakes:[{t:"Evaluating LLMs only with vibes",d:"Manual review doesn't scale. Build automated eval harnesses before deploying any LLM."},{t:"Ignoring inference cost",d:"$0.01/request sounds cheap until you have 10M req/day. Cost modelling is a first-class concern."},{t:"Agents without human checkpoints",d:"Autonomous agents taking irreversible actions without approval. Define the reversibility boundary."}],
        mentalModels:["Agents as unreliable contractors: remarkable work, but need clear briefs, checkpoints, and the ability to be interrupted.","Training-serving skew: the feature computation at training time and serving time must be identical. Divergence = silent bugs."]
      },
    ]
  },
  {
    id:6, label:"Phase 6", title:"Reliability, Security & Cost Engineering",
    subtitle:"Chaos Engineering, Observability, FinOps, Security",
    duration:"3–4 months", color:{dot:"#BA7517",light:"#FAEEDA",dark:"#633806",mid:"#BA7517",border:"#854F0B"},
    why:"Systems that can't be debugged, can't be secured, and can't be afforded don't survive long. This phase transforms an architect from someone who builds systems that work into someone who builds systems that work reliably, safely, and economically.",
    subjects:[
      {id:"6-1",label:"6.1 Observability",duration:"3–4 wk",why:"You cannot debug a distributed system you cannot observe. Observability is the practice of designing systems so that their internal state can be inferred from their external outputs.",
        units:[{num:"U1",title:"Three pillars",week:"Wk 1–2",topics:[{n:"Structured logging",d:"Log as events, not strings — JSON with context"},{n:"Metrics & time series",d:"Counter, gauge, histogram, summary"},{n:"Distributed tracing",d:"Trace IDs, span relationships, sampling"},{n:"OpenTelemetry",d:"Vendor-neutral instrumentation standard"}],insight:"Logs, metrics, and traces answer different questions. Metrics: is something wrong? Logs: what happened? Traces: where did latency come from?",ic:"#633806"},{num:"U2",title:"SLOs & alerting",week:"Wk 2–4",topics:[{n:"SLI, SLO, SLA definitions",d:"What to measure and at what threshold"},{n:"Error budgets",d:"How to spend them deliberately"},{n:"Alert on symptoms, not causes",d:"SLO breach alerting vs log error alerting"},{n:"Dashboards that matter",d:"The four golden signals: latency, traffic, errors, saturation"}],insight:"Alert on SLO breach (what the user experiences). Investigate the cause with observability tools. Never alert on individual log errors.",ic:"#633806"}],
        projects:[{l:"INTERMEDIATE",n:"Full-stack observability platform",d:"OpenTelemetry on multi-service app. Dashboards, alerting, correlate logs-metrics-traces."},{l:"ADVANCED",n:"SLO-based alerting system",d:"Define SLOs for 3 services. Build error budget dashboards. Implement burn rate alerting."}],
        resources:[{t:"BOOK",n:"Observability Engineering — Charity Majors",s:"The definitive guide to structured events, sampling, tracing."},{t:"BOOK",n:"Site Reliability Engineering (Google)",s:"Free at sre.google. Chapters 1–15 essential."},{t:"TOOL",n:"OpenTelemetry, Jaeger, Prometheus, Grafana",s:"Build the full stack yourself at least once."}],
        schedule:[{p:"Wk 1–2",t:"OpenTelemetry instrumentation. Logs + metrics + traces on existing project."},{p:"Wk 3–4",t:"SLOs: define for 3 services. Error budget dashboards. Burn rate alerting."}],
        mistakes:[{t:"Alerting on every log error",d:"This generates alert fatigue. Alert on SLO breach, investigate with logs."},{t:"Tracing without sampling strategy",d:"100% trace sampling will bankrupt your storage budget at scale. Implement head-based or tail-based sampling."}],
        mentalModels:["Reliability as a budget: every system has an error budget (1 - SLO). Spend it deliberately on innovation, not accidentally on incidents.","Four golden signals: latency, traffic, errors, saturation. Dashboard these for every service you own."]
      },
      {id:"6-2",label:"6.2 Chaos Engineering",duration:"2–3 wk",why:"Chaos engineering is the practice of experimenting on a system to build confidence in its ability to withstand turbulent conditions. Systems that aren't tested for failure will fail unexpectedly in production.",
        units:[{num:"U1",title:"Chaos engineering principles",week:"Wk 1–2",topics:[{n:"Hypothesis-driven experiments",d:"Steady state, hypothesis, blast radius, abort"},{n:"Failure injection types",d:"Network latency, partition, resource exhaustion, node kill"},{n:"Game days",d:"Planned failure exercises with the full team"},{n:"Chaos Monkey & Gremlin",d:"Tooling for automated failure injection"}],insight:"Running chaos experiments for the first time during an actual incident is too late. Game days exist to find failure modes before they find you.",ic:"#633806"},{num:"U2",title:"Self-healing systems",week:"Wk 2–3",topics:[{n:"Auto-scaling policies",d:"CPU-based vs custom metrics"},{n:"Circuit breaker automation",d:"Automatic trip and reset"},{n:"Health checks & readiness",d:"Kubernetes liveness vs readiness probes"},{n:"Runbooks as code",d:"Automated remediation of known failure modes"}],insight:"The goal is that on-call is never paged for a failure mode you've seen before. Automate every known recovery.",ic:"#633806"}],
        projects:[{l:"INTERMEDIATE",n:"Chaos engineering programme",d:"Set up Chaos Monkey on test cluster. 10 experiments with hypothesis, blast radius, abort conditions. Document learnings."},{l:"ADVANCED",n:"Self-healing infrastructure",d:"Failed nodes auto-replace, services auto-scale, circuit breakers trip/recover, no pages for known failures."}],
        resources:[{t:"BOOK",n:"Chaos Engineering — Basiri et al.",s:"O'Reilly. The definitive reference by Netflix's chaos engineers."},{t:"TOOL",n:"Chaos Monkey, Gremlin, Litmus",s:"Pick one and run real experiments."}],
        schedule:[{p:"Wk 1",t:"Chaos principles. Design and run 5 experiments. Write blameless post-mortems."},{p:"Wk 2–3",t:"Self-healing patterns. Automated circuit breakers. Runbook automation."}],
        mistakes:[{t:"Chaos in production without a steady state baseline",d:"You can't tell if chaos had an effect if you don't know what normal looks like."},{t:"Skipping the abort condition",d:"Every chaos experiment must have a pre-defined abort trigger. This is non-negotiable."}],
        mentalModels:["Chaos engineering is not breaking things — it's building confidence through controlled experiments.","Every incident post-mortem that ends with 'we didn't know this could happen' is an argument for more chaos testing."]
      },
      {id:"6-3",label:"6.3 Security Architecture",duration:"3–4 wk",why:"Security added as a final gate doesn't work. Threat modelling at design time, defence in depth, and zero-trust networking are the principles that make systems survivable.",
        units:[{num:"U1",title:"Threat modelling",week:"Wk 1",topics:[{n:"STRIDE framework",d:"Spoofing, Tampering, Repudiation, Info Disclosure, DoS, Elevation"},{n:"Attack trees",d:"Systematic threat enumeration"},{n:"Data flow diagrams",d:"Trust boundaries, data stores, external entities"}],insight:"Threat modelling must happen at design time, not after architecture is frozen. Schedule it immediately after the initial design doc.",ic:"#633806"},{num:"U2",title:"Auth, encryption & zero-trust",week:"Wk 2–4",topics:[{n:"OAuth2 & OIDC",d:"Authorisation vs authentication flows"},{n:"mTLS & service identity",d:"SPIFFE/SPIRE for service-to-service auth"},{n:"TLS internals",d:"Cipher suites, certificate chains, HSTS"},{n:"Secret management",d:"Vault, KMS, rotation — never hardcode credentials"},{n:"Zero-trust networking",d:"BeyondCorp model — verify every request"}],insight:"The BeyondCorp model: never trust the network, always verify the identity. Every internal request is treated as coming from the public internet.",ic:"#633806"}],
        projects:[{l:"INTERMEDIATE",n:"Threat model — 3 system designs",d:"Apply STRIDE to 3 existing designs. Fix top 5 findings per system."},{l:"ADVANCED",n:"Zero-trust service mesh",d:"mTLS between all services using SPIFFE/SPIRE. Secret rotation via Vault. Audit log every auth decision."}],
        resources:[{t:"BOOK",n:"Threat Modeling — Adam Shostack",s:"STRIDE, attack trees, threat modelling at design time."},{t:"BOOK",n:"Designing Secure Software — Loren Kohnfelder",s:"Practical security engineering from an ex-Google engineer."}],
        schedule:[{p:"Wk 1",t:"STRIDE threat model on 3 existing projects. Find and fix 5 issues each."},{p:"Wk 2–3",t:"OAuth2 + OIDC deep dive. mTLS setup. Secret rotation via Vault."},{p:"Wk 4",t:"Zero-trust service mesh project."}],
        mistakes:[{t:"Security as a final gate",d:"Adding security review as the last step before deployment. Threat modelling must happen at design time."},{t:"Storing secrets in environment variables",d:"Environment variables leak via process listings and debug endpoints. Use a proper secrets manager."}],
        mentalModels:["Security as concentric rings: assume every ring will be breached. Each inner ring needs its own controls, not just trust from the outer ring.","Zero trust: the network is always hostile. Verify identity, not location."]
      },
      {id:"6-4",label:"6.4 FinOps & Cost Engineering",duration:"2–3 wk",why:"Cost is a fifth dimension of performance. A system that is fast, reliable, secure, and scalable but unaffordable is a failed system. FinOps is the discipline of managing cloud costs with engineering rigour.",
