let state = {phase: 1, view: 'phase', subjectId: null, tab: {}};

function phaseColor(id) { return PH.find(p=>p.id===id).color; }

function buildPills() {
  const c = document.getElementById('phase-pills');
  PH.forEach(ph => {
    const btn = document.createElement('button');
    btn.className = 'pp';
    btn.id = 'pp-'+ph.id;
    btn.textContent = ph.label;
    btn.style.color = ph.color.dark;
    btn.style.borderColor = ph.color.mid;
    btn.onclick = () => selectPhase(ph.id);
    c.appendChild(btn);
  });
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  PH.forEach(ph => {
    const block = document.createElement('div');
    block.className = 'sb-phase';
    block.id = 'sbph-'+ph.id;

    const hdr = document.createElement('div');
    hdr.className = 'sb-phase-hdr';
    hdr.innerHTML = `<div class="sb-dot" style="background:${ph.color.dot}"></div><div class="sb-phase-name">${ph.label}: ${ph.title}</div><span class="sb-chev">▶</span>`;
    hdr.onclick = () => toggleSbPhase(ph.id);

    const subjects = document.createElement('div');
    subjects.className = 'sb-subjects';
    subjects.id = 'sbsubj-'+ph.id;

    ph.subjects.forEach(s => {
      const item = document.createElement('div');
      item.className = 'sb-subj';
      item.id = 'sbitem-'+s.id;
      item.textContent = s.label;
      item.onclick = (e) => { e.stopPropagation(); selectSubject(ph.id, s.id); };
      subjects.appendChild(item);
    });

    block.appendChild(hdr);
    block.appendChild(subjects);
    sb.appendChild(block);
  });
}

function toggleSbPhase(phId) {
  const block = document.getElementById('sbph-'+phId);
  const isOpen = block.classList.contains('open');
  document.querySelectorAll('.sb-phase').forEach(b => b.classList.remove('open'));
  if (!isOpen) {
    block.classList.add('open');
    selectPhase(phId);
  }
}

function selectPhase(phId) {
  state.phase = phId;
  state.view = 'phase';
  state.subjectId = null;

  document.querySelectorAll('.pp').forEach(b => {
    const id = parseInt(b.id.replace('pp-',''));
    const ph = PH.find(p=>p.id===id);
    b.style.background = id === phId ? ph.color.light : 'transparent';
    b.style.fontWeight = id === phId ? '500' : '400';
  });

  document.querySelectorAll('.sb-subj').forEach(el => el.classList.remove('active'));

  const block = document.getElementById('sbph-'+phId);
  if (!block.classList.contains('open')) {
    document.querySelectorAll('.sb-phase').forEach(b => b.classList.remove('open'));
    block.classList.add('open');
  }

  renderMain();
}

function selectSubject(phId, subjId) {
  state.phase = phId;
  state.view = 'subject';
  state.subjectId = subjId;

  selectPhase(phId);
  state.view = 'subject';
  state.subjectId = subjId;

  document.querySelectorAll('.sb-subj').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('sbitem-'+subjId);
  if (el) {
    el.classList.add('active');
    el.style.color = phaseColor(phId).mid;
  }

  renderMain();
}

function renderMain() {
  const m = document.getElementById('main');
  m.innerHTML = '';
  if (state.view === 'phase') renderPhaseView(m);
  else renderSubjectView(m);
}

function renderPhaseView(m) {
  const ph = PH.find(p=>p.id===state.phase);
  const col = ph.color;

  const hdr = document.createElement('div');
  hdr.className = 'ph-header';
  hdr.innerHTML = `<div class="ph-title">${ph.label}: ${ph.title}</div><div class="ph-meta">${ph.subtitle} · ${ph.duration}</div>`;
  m.appendChild(hdr);

  const why = document.createElement('div');
  why.className = 'ph-why';
  why.textContent = ph.why;
  m.appendChild(why);

  const g = document.createElement('div');
  g.className = 'subj-grid';
  ph.subjects.forEach(s => {
    const card = document.createElement('div');
    card.className = 'subj-card';
    card.innerHTML = `<div class="sc-num" style="color:${col.mid}">${s.label}</div><div class="sc-name">${s.label.split(' ').slice(1).join(' ')}</div><div class="sc-dur">${s.duration}</div>`;
    card.onclick = () => selectSubject(ph.id, s.id);
    g.appendChild(card);
  });
  m.appendChild(g);

  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:11px;color:var(--color-text-tertiary);margin-top:4px';
  hint.textContent = 'Click any subject card or sidebar item to open its full syllabus.';
  m.appendChild(hint);
}

function renderSubjectView(m) {
  const ph = PH.find(p=>p.id===state.phase);
  const s = ph.subjects.find(x=>x.id===state.subjectId);
  const col = ph.color;
  const TABS = ['Units','Projects','Resources','Schedule','Mistakes','Mental Models'];
  if (!state.tab[s.id]) state.tab[s.id] = 0;

  const bc = document.createElement('div');
  bc.className = 'breadcrumb';
  bc.innerHTML = `<span onclick="selectPhase(${ph.id})">${ph.label}: ${ph.title}</span> / ${s.label}`;
  m.appendChild(bc);

  const titleBar = document.createElement('div');
  titleBar.className = 'subj-title-bar';
  titleBar.innerHTML = `<div class="subj-title">${s.label.split(' ').slice(1).join(' ')}</div><span class="subj-dur-badge" style="background:${col.light};color:${col.dark}">${s.duration}</span>`;
  m.appendChild(titleBar);

  const why = document.createElement('div');
  why.className = 'ph-why';
  why.style.marginBottom = '1rem';
  why.textContent = s.why;
  m.appendChild(why);

  const tabsEl = document.createElement('div');
  tabsEl.className = 'section-tabs';

  const panelWrap = document.createElement('div');

  TABS.forEach((name, ti) => {
    const btn = document.createElement('button');
    btn.className = 'stab' + (ti===state.tab[s.id]?' on':'');
    btn.style.borderBottomColor = ti===state.tab[s.id] ? col.mid : 'transparent';
    btn.textContent = name;
    btn.onclick = () => {
      state.tab[s.id] = ti;
      tabsEl.querySelectorAll('.stab').forEach((b,bi) => {
        b.classList.toggle('on', bi===ti);
        b.style.borderBottomColor = bi===ti ? col.mid : 'transparent';
      });
      panelWrap.querySelectorAll('.panel').forEach((p,pi) => p.classList.toggle('on', pi===ti));
    };
    tabsEl.appendChild(btn);
  });
  m.appendChild(tabsEl);

  const panels = TABS.map((_,ti) => {
    const p = document.createElement('div');
    p.className = 'panel' + (ti===state.tab[s.id]?' on':'');
    panelWrap.appendChild(p);
    return p;
  });

  // Units
  (s.units||[]).forEach(u => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    const num = document.createElement('span');
    num.className = 'u-num';
    num.style.background = col.light;
    num.style.color = col.dark;
    num.textContent = u.num;
    const hdr = document.createElement('div');
    hdr.className = 'unit-hdr';
    hdr.appendChild(num);
    hdr.innerHTML += `<span class="u-title">${u.title}</span><span class="u-week">${u.week}</span><span class="u-chev">▶</span>`;
    hdr.onclick = () => card.classList.toggle('open');
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'unit-body';
    const tg = document.createElement('div');
    tg.className = 'topic-grid';
    (u.topics||[]).forEach(t => {
      tg.innerHTML += `<div class="topic-chip"><div class="tc-name">${t.n}</div><div class="tc-note">${t.d}</div></div>`;
    });
    body.appendChild(tg);
    if (u.insight) {
      const ins = document.createElement('div');
      ins.className = 'insight-box';
      ins.style.borderLeftColor = u.ic || col.mid;
      ins.textContent = u.insight;
      body.appendChild(ins);
    }
    card.appendChild(body);
    panels[0].appendChild(card);
  });

  // Projects
  const lvC = {STARTER:{bg:"#e1f5ee",c:"#0F6E56"},INTERMEDIATE:{bg:"#e8f1fa",c:"#185FA5"},ADVANCED:{bg:"#fbeaf0",c:"#72243E"},EXPLORATION:{bg:"#EEEDFE",c:"#534AB7"},VISION:{bg:"#F1EFE8",c:"#444441"}};
  (s.projects||[]).forEach(p => {
    const lv = lvC[p.l]||lvC.STARTER;
    panels[1].innerHTML += `<div class="proj-item"><span class="proj-lv" style="background:${lv.bg};color:${lv.c}">${p.l}</span><div class="proj-name">${p.n}</div><div class="proj-desc">${p.d}</div></div>`;
  });

  // Resources
  (s.resources||[]).forEach(r => {
    panels[2].innerHTML += `<div class="res-row"><span class="res-type">${r.t}</span><div><div class="res-name">${r.n}</div><div class="res-sub">${r.s}</div></div></div>`;
  });

  // Schedule
  (s.schedule||[]).forEach(w => {
    panels[3].innerHTML += `<div class="week-row"><span class="wk">${w.p}</span><div class="wk-task">${w.t}</div></div>`;
  });

  // Mistakes
  (s.mistakes||[]).forEach(mk => {
    panels[4].innerHTML += `<div class="mistake-row"><div class="m-dot">!</div><div class="m-text"><b>${mk.t}:</b> ${mk.d}</div></div>`;
  });

  // Mental Models
  (s.mentalModels||[]).forEach(mm => {
    panels[5].innerHTML += `<div class="mm-card">${mm}</div>`;
  });

  m.appendChild(panelWrap);
}

buildPills();
buildSidebar();

document.getElementById('sbph-1').classList.add('open');
selectPhase(1);
</script>
